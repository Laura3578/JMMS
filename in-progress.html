<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>























































/* =========================================================
   JM Mountain Studio — shared styles
   Brand colors sampled from supplied logos:
   teal #17454F  •  rust #9D4627  •  white #FFFFFF
   ========================================================= */

:root{
  --ink:#1A1A1A;
  --teal:#17454F;
  --teal-700:#1C5A66;
  --teal-900:#0E333B;
  --rust:#9D4627;
  --rust-600:#B5532F;
  --paper:#F6F2EA;
  --sand:#E8E0D2;
  --stone:#9DACA9;
  --white:#FFFFFF;
  --line:rgba(23,69,79,.16);
  --shadow:0 18px 50px -24px rgba(14,51,59,.45);
  --maxw:1160px;
  --ease:cubic-bezier(.4,.12,.15,1);
}

*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;
  background:var(--paper);
  color:var(--ink);
  font-family:"Spectral",Georgia,serif;
  font-size:18px;
  line-height:1.65;
  -webkit-font-smoothing:antialiased;
}
img{max-width:100%;display:block}
a{color:var(--rust);text-decoration:none}
a:hover{text-decoration:underline}

/* ---------- type ---------- */
h1,h2,h3,.eyebrow,.nav-links a,.btn,.brandword{
  font-family:"Archivo","Helvetica Neue",Arial,sans-serif;
}
h1,h2,h3{color:var(--teal);line-height:1.05;margin:0 0 .4em;font-weight:700;letter-spacing:-.01em}
h1{font-size:clamp(2.4rem,6vw,4.4rem)}
h2{font-size:clamp(1.8rem,3.6vw,2.8rem)}
h3{font-size:1.2rem;letter-spacing:.01em}
p{margin:0 0 1.1em}
.lead{font-size:clamp(1.15rem,2vw,1.45rem);line-height:1.5}
.eyebrow{
  display:inline-block;font-size:.78rem;font-weight:600;
  letter-spacing:.22em;text-transform:uppercase;color:var(--rust);
  margin-bottom:1rem;
}
.eyebrow.light{color:#E9C9B7}

/* ---------- layout ---------- */
.container{max-width:var(--maxw);margin:0 auto;padding:0 clamp(1.2rem,4vw,2.5rem)}
.section{padding:clamp(3.5rem,8vw,6.5rem) 0}
.section.tight{padding:clamp(2.5rem,5vw,4rem) 0}
.section.paper{background:var(--paper)}
.section.sand{background:var(--sand)}
.section.teal{background:var(--teal);color:#EAF1F0}
.section.teal h1,.section.teal h2,.section.teal h3{color:#fff}
.center{text-align:center}
.narrow{max-width:720px;margin-left:auto;margin-right:auto}

/* ---------- header / nav ---------- */
.site-header{
  position:fixed;top:0;left:0;right:0;z-index:50;
  display:flex;align-items:center;justify-content:space-between;
  padding:.9rem clamp(1.2rem,4vw,2.5rem);
  background:linear-gradient(180deg,rgba(14,51,59,.6),rgba(14,51,59,0));
  transition:background .35s var(--ease),box-shadow .35s var(--ease),padding .35s var(--ease);
}
.site-header.scrolled,.site-header.solid{
  background:var(--paper);box-shadow:0 1px 0 var(--line),0 10px 30px -22px rgba(14,51,59,.5);
}
.site-header .logo-wide{height:46px;width:auto;transition:height .35s var(--ease)}
.site-header.scrolled .logo-wide,.site-header.solid .logo-wide{height:40px}
/* white logo knockout when over the dark hero */
.site-header:not(.scrolled):not(.solid) .logo-wide{filter:brightness(0) invert(1) drop-shadow(0 1px 5px rgba(0,0,0,.45))}

.nav-links{display:flex;gap:1.8rem;align-items:center;list-style:none;margin:0;padding:0}
.nav-links a{
  font-size:.82rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;
  color:var(--teal);text-decoration:none;padding:.3rem 0;position:relative;
}
.site-header:not(.scrolled):not(.solid) .nav-links a{color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.45)}
.nav-links a::after{
  content:"";position:absolute;left:0;bottom:-2px;height:2px;width:0;background:var(--rust);
  transition:width .3s var(--ease);
}
.nav-links a:hover::after,.nav-links a.active::after{width:100%}
.nav-links a:hover{text-decoration:none}

.nav-toggle{display:none;background:none;border:0;cursor:pointer;padding:.4rem;width:42px;height:42px}
.nav-toggle span{display:block;height:2px;width:24px;background:var(--teal);margin:5px auto;transition:.3s}
.site-header:not(.scrolled):not(.solid) .nav-toggle span{background:#fff}

/* ---------- buttons ---------- */
.btn{
  display:inline-block;font-size:.82rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;
  padding:.85rem 1.7rem;border-radius:2px;border:2px solid var(--teal);
  background:var(--teal);color:#fff;cursor:pointer;transition:.25s var(--ease);
}
.btn:hover{background:var(--teal-700);border-color:var(--teal-700);text-decoration:none;transform:translateY(-2px)}
.btn-rust{background:var(--rust);border-color:var(--rust)}
.btn-rust:hover{background:var(--rust-600);border-color:var(--rust-600)}
.btn-ghost{background:transparent;color:var(--teal)}
.btn-ghost:hover{background:var(--teal);color:#fff}
.btn-ghost.light{color:#fff;border-color:#fff}
.btn-ghost.light:hover{background:#fff;color:var(--teal)}
.btn-row{display:flex;gap:1rem;flex-wrap:wrap}

/* ---------- hero ---------- */
.hero{
  position:relative;min-height:100svh;display:flex;align-items:center;
  color:#fff;padding:7rem 0 4rem;
}
.hero-bg{position:absolute;inset:0;z-index:-2;overflow:hidden}
.hero-bg img{width:100%;height:100%;object-fit:cover}
.hero-bg::after{
  content:"";position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(14,51,59,.45) 0%,rgba(14,51,59,.25) 40%,rgba(14,51,59,.78) 100%);
}
.hero .container{position:relative;z-index:1}
.hero h1{color:#fff;max-width:14ch}
.hero .lead{color:#EAF1F0;max-width:46ch}
.hero .btn-row{margin-top:2rem}

/* ---------- ridgeline signature divider ---------- */
.ridge{display:block;width:100%;height:auto;color:var(--teal)}
.ridge.faint{opacity:.18}
.ridge.rust{color:var(--rust)}
.ridge-wrap{padding:1.5rem 0}

/* ---------- photo-backed quote band ---------- */
.quoteband{position:relative;color:#fff;padding:clamp(4rem,9vw,7rem) 0;overflow:hidden}
.quoteband-bg{position:absolute;inset:0;z-index:-2}
.quoteband-bg img{width:100%;height:100%;object-fit:cover}
.quoteband-bg::after{content:"";position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(14,51,59,.80),rgba(14,51,59,.90))}
.quoteband blockquote{margin:0;max-width:920px;font-family:"Spectral",serif;font-style:italic;
  font-size:clamp(1.35rem,2.8vw,2rem);line-height:1.45}

/* ---------- intro / split ---------- */
.split{display:grid;grid-template-columns:1.1fr .9fr;gap:clamp(2rem,5vw,4.5rem);align-items:center}
.split.flip .split-media{order:2}
.split-media img{border-radius:3px;box-shadow:var(--shadow)}

/* ---------- work / gallery grid ---------- */
.work-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:1.4rem;margin-top:2.5rem;
}
.tile{
  position:relative;aspect-ratio:4/3;border-radius:3px;overflow:hidden;
  background:var(--sand);
}
.tile img{width:100%;height:100%;object-fit:cover;transition:transform .5s var(--ease)}
.tile:hover img{transform:scale(1.04)}
.tile .caption{
  position:absolute;left:0;right:0;bottom:0;padding:.9rem 1.1rem;
  background:linear-gradient(0deg,rgba(14,51,59,.9),transparent);
  color:#fff;font-family:"Archivo",sans-serif;font-size:.9rem;
}
/* empty placeholder tiles */
.tile.placeholder{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  border:2px dashed rgba(23,69,79,.35);background:rgba(157,172,169,.18);color:var(--teal);
  text-align:center;padding:1rem;
}
.tile.placeholder svg{width:46px;height:46px;opacity:.5;margin-bottom:.6rem}
.tile.placeholder span{font-family:"Archivo",sans-serif;font-size:.82rem;letter-spacing:.08em;
  text-transform:uppercase;font-weight:600;opacity:.8}
.tile.placeholder .fname{font-family:"Archivo",sans-serif;font-size:.7rem;letter-spacing:.03em;
  text-transform:none;font-weight:500;opacity:.6;margin-top:.4rem}

/* ---------- stats (impact) ---------- */
.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1.5rem;margin-top:2.5rem}
.stat{text-align:center;padding:1.5rem 1rem;background:rgba(255,255,255,.06);border-radius:3px}
.stat .num{font-family:"Archivo",sans-serif;font-weight:800;font-size:clamp(2.4rem,5vw,3.4rem);
  color:#fff;line-height:1}
.stat .label{font-family:"Archivo",sans-serif;text-transform:uppercase;letter-spacing:.14em;
  font-size:.78rem;color:#CFE0DD;margin-top:.6rem}

/* ---------- contact ---------- */
.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:clamp(2rem,5vw,4rem)}
.contact-list{list-style:none;margin:0;padding:0;font-family:"Archivo",sans-serif}
.contact-list li{display:flex;gap:.9rem;align-items:baseline;margin-bottom:1.1rem;font-size:1.02rem}
.contact-list .k{color:var(--rust);text-transform:uppercase;letter-spacing:.12em;font-size:.74rem;
  font-weight:600;min-width:92px}

/* ---------- placeholder copy styling (so it's obviously not final) ---------- */
.ph{
  background:rgba(157,69,38,.10);border-bottom:2px dashed var(--rust);
  padding:0 .25em;color:var(--rust-600);font-style:italic;
}
.ph-block{
  border:2px dashed var(--rust);background:rgba(157,69,38,.06);
  border-radius:4px;padding:1.1rem 1.3rem;color:#7a4a36;font-style:italic;
}
.ph-block::before{
  content:"✎ YOUR WORDS GO HERE";display:block;font-family:"Archivo",sans-serif;
  font-style:normal;font-size:.7rem;letter-spacing:.16em;color:var(--rust);
  margin-bottom:.5rem;font-weight:700;
}

/* ---------- footer ---------- */
.site-footer{background:var(--teal-900);color:#BFD2CF;padding:3.5rem 0 2rem;font-family:"Archivo",sans-serif}
.footer-grid{display:flex;justify-content:space-between;gap:2rem;flex-wrap:wrap;align-items:flex-start}
.site-footer img.fmark{height:54px;filter:brightness(0) invert(1);opacity:.9}
.site-footer a{color:#E9C9B7}
.foot-soc{display:flex;gap:1.2rem;margin-top:.5rem;font-size:.85rem;letter-spacing:.1em;text-transform:uppercase}
.foot-bottom{margin-top:2.5rem;padding-top:1.4rem;border-top:1px solid rgba(255,255,255,.12);
  font-size:.78rem;color:#7FA09B;display:flex;justify-content:space-between;flex-wrap:wrap;gap:.6rem}

/* ---------- reveal animation ---------- */
.reveal{opacity:0;transform:translateY(22px);transition:opacity .7s var(--ease),transform .7s var(--ease)}
.reveal.in{opacity:1;transform:none}

/* ---------- responsive ---------- */
@media(max-width:860px){
  .split,.contact-grid{grid-template-columns:1fr}
  .split.flip .split-media{order:0}
  .nav-toggle{display:block}
  .nav-links{
    position:fixed;inset:0 0 0 auto;width:min(78vw,320px);background:var(--paper);
    flex-direction:column;align-items:flex-start;gap:1.4rem;padding:5.5rem 2rem;
    transform:translateX(100%);transition:transform .35s var(--ease);box-shadow:var(--shadow);
  }
  .nav-links.open{transform:none}
  .nav-links a{color:var(--teal)!important;font-size:1rem}
}
@media(prefers-reduced-motion:reduce){
  *{animation:none!important;transition:none!important;scroll-behavior:auto!important}
  .reveal{opacity:1;transform:none}
}

section[id]{scroll-margin-top:84px}
























































/* ---- header override (teal) ---- */
.site-header{background:var(--teal)!important}
.site-header.scrolled{background:var(--teal)!important;box-shadow:0 2px 20px -8px rgba(0,0,0,.55)}
.site-header .logo-wide{filter:none!important}
.site-header .logo-wide,.site-header.solid .logo-wide,.site-header.scrolled .logo-wide{height:46px!important}
.site-header .nav-links a{color:#fff!important;text-shadow:none!important}
.site-header .nav-toggle span{background:#fff!important}
@media(max-width:860px){
  .site-header .nav-links{background:var(--teal)}
  .site-header .nav-links a{color:#fff!important}
}

.section.woodbg{background-color:var(--paper);background-image:url(images/wood-teal.png);background-size:300px 300px;background-repeat:repeat}

.work-grid.tall .tile{aspect-ratio:1/2;background:#ebe7e3}
.work-grid.tall .tile img{object-fit:contain}
.work-grid.tall .tile:hover img{transform:none}

.hero{min-height:72svh;padding-top:5rem}
.hero h1{font-size:clamp(1.7rem,3.6vw,2.6rem)}
.hero .container{text-align:center}
.hero h1,.hero .lead{margin-left:auto;margin-right:auto}
.hero .btn-row{justify-content:center}
.section.teal h1{font-size:clamp(1.7rem,3.6vw,2.6rem)}
.section.teal:not(.center) .container{margin-left:0}

.site-header{padding-top:.45rem!important;padding-bottom:.45rem!important}

.section.teal:not(.center){display:flex;flex-direction:column;justify-content:flex-end;min-height:40svh;padding-bottom:1.8rem}

</style>

</head>

<script>

(function(){
 var header=document.querySelector('.site-header');
 var toggle=document.querySelector('.nav-toggle');
 var links=document.querySelector('.nav-links');
 if(toggle&&links){toggle.addEventListener('click',function(){links.classList.toggle('open');});
   links.querySelectorAll('a').forEach(function(a){a.addEventListener('click',function(){links.classList.remove('open');});});}
 function onScroll(){if(!header)return;if(window.scrollY>40)header.classList.add('scrolled');else header.classList.remove('scrolled');}
 window.addEventListener('scroll',onScroll,{passive:true});onScroll();
 var reduce=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
 var items=document.querySelectorAll('.reveal');
 if(reduce||!('IntersectionObserver'in window)){items.forEach(function(el){el.classList.add('in');});}
 else{var io=new IntersectionObserver(function(es){es.forEach(function(e){if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}});},{threshold:0.12});
   items.forEach(function(el){io.observe(el);});}
 var yr=document.getElementById('yr'); if(yr) yr.textContent=new Date().getFullYear();
})();

</script>
